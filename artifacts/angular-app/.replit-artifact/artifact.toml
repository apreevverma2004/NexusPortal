kind = "web"
previewPath = "/"
title = "Angular SPA"
version = "1.0.0"
id = "artifacts/angular-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24842

[services.development]
run = "pnpm --filter @workspace/angular-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/angular-app", "run", "build" ]
publicDir = "artifacts/angular-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24842"
BASE_PATH = "/"
